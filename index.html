<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Welcome • Elm Roots</title>
    <meta name="description" content="Elm Roots develops applications.">
    <style>
      :root {
        --bg: #0b0e14;
        --bg-elev: #121723;
        --fg: #e6e9ef;
        --muted: #9aa4b2;
        --accent: #7aa2f7;
        --accent-strong: #5b8cfa;
        --card: #101521;
        --border: #1e2533;
        --ok: #7bd88f;
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f7f8fb;
          --bg-elev: #ffffff;
          --fg: #1f2430;
          --muted: #556070;
          --accent: #3b82f6;
          --accent-strong: #2563eb;
          --card: #ffffff;
          --border: #e6e8ee;
          --ok: #16a34a;
        }
      }

      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        background: radial-gradient(1200px 600px at 10% -10%, rgba(122,162,247,0.20), transparent 50%),
                    radial-gradient(900px 500px at 110% -20%, rgba(123,216,143,0.16), transparent 60%),
                    var(--bg);
        color: var(--fg);
        font: 16px/1.6 system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      }
      .container {
        max-width: 980px;
        padding: 24px;
        margin: 0 auto;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 0 8px 0;
      }
      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-weight: 700;
        letter-spacing: 0.2px;
        text-decoration: none;
        color: var(--fg);
      }
      .brand-badge {
        width: 28px;
        height: 28px;
        border-radius: 8px;
        background: linear-gradient(135deg, var(--accent), var(--ok));
        box-shadow: 0 6px 18px rgba(0,0,0,0.25), inset 0 0 0 1px rgba(255,255,255,0.14);
      }
      nav a {
        color: var(--muted);
        text-decoration: none;
        padding: 8px 10px;
        border-radius: 8px;
      }
      nav a:hover { color: var(--fg); background: rgba(122,162,247,0.10); }

      .hero {
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 28px;
        align-items: center;
        padding: 36px 0 12px 0;
      }
      .hero h1 {
        margin: 0 0 8px 0;
        font-size: clamp(28px, 4vw, 42px);
        line-height: 1.15;
        letter-spacing: -0.4px;
      }
      .hero p { margin: 0 0 18px 0; color: var(--muted); }

      .cta {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        border-radius: 12px;
        background: linear-gradient(180deg, var(--accent), var(--accent-strong));
        color: white;
        text-decoration: none;
        font-weight: 600;
        box-shadow: 0 10px 22px rgba(59,130,246,0.35);
        transform: translateY(0);
        transition: transform 120ms ease, box-shadow 120ms ease, opacity 120ms ease;
      }
      .cta:hover { transform: translateY(-1px); box-shadow: 0 14px 26px rgba(59,130,246,0.45); }
      .cta:active { transform: translateY(0); box-shadow: 0 8px 18px rgba(59,130,246,0.35); }

      .panel {
        background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.00));
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 18px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 16px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 16px;
        text-decoration: none;
        color: inherit;
        transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
      }
      .card:hover { transform: translateY(-2px); border-color: color-mix(in oklab, var(--accent) 60%, var(--border)); }
      .card h3 { margin: 0 0 6px 0; font-size: 18px; }
      .card p { margin: 0; color: var(--muted); }

      footer { color: var(--muted); padding: 28px 0; font-size: 14px; }

      @media (max-width: 820px) {
        .hero { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <a class="brand" href="./" aria-label="Home">
          <span class="brand-badge" aria-hidden="true"></span>
          <span>Elm Roots</span>
        </a>
        <nav>
          <a href=".">Ratings NOW!</a>
        </nav>
      </header>

      <section class="hero">
        <div>
          <h1>Welcome — explore our apps</h1>
          <p>
            This site hosts a collection of apps. If you want something
            useful to try right now, try this:
          </p>
          <a class="cta" href="https://appstore.apple.com/app/id123456789" aria-label="Ratings NOW!">▶ Ratings NOW!</a>
        </div>
        <div class="panel" role="img" aria-label="Abstract decorative graphic">
          <svg width="100%" height="220" viewBox="0 0 640 220" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="g1" x1="0" x2="1" y1="0" y2="1">
                <stop offset="0%" stop-color="var(--accent)" stop-opacity="0.9"/>
                <stop offset="100%" stop-color="var(--ok)" stop-opacity="0.9"/>
              </linearGradient>
            </defs>
            <rect x="0" y="0" width="640" height="220" rx="12" fill="url(#g1)" opacity="0.08"/>
            <g opacity="0.9">
              <circle cx="80" cy="60" r="10" fill="var(--accent)"/>
              <circle cx="120" cy="100" r="10" fill="var(--ok)"/>
              <circle cx="160" cy="60" r="10" fill="var(--accent)"/>
              <circle cx="200" cy="100" r="10" fill="var(--ok)"/>
              <circle cx="240" cy="60" r="10" fill="var(--accent)"/>
              <circle cx="280" cy="100" r="10" fill="var(--ok)"/>
              <circle cx="320" cy="60" r="10" fill="var(--accent)"/>
              <circle cx="360" cy="100" r="10" fill="var(--ok)"/>
              <circle cx="400" cy="60" r="10" fill="var(--accent)"/>
              <circle cx="440" cy="100" r="10" fill="var(--ok)"/>
              <circle cx="480" cy="60" r="10" fill="var(--accent)"/>
              <circle cx="520" cy="100" r="10" fill="var(--ok)"/>
              <circle cx="560" cy="60" r="10" fill="var(--accent)"/>
            </g>
          </svg>
        </div>
      </section>

      <section>
        <h2 style="margin: 0 0 10px 0; font-size: 20px;">Featured</h2>
        <div class="grid">
          <a class="card" href="https://appstore.apple.com/app/id123456789" aria-label="Open Ratings NOW! app">
            <h3>Ratings NOW!</h3>
            <p>A useful app for getting movie and TV ratings fast!</p>
          </a>
        </div>
      </section>

      <footer>
        <div>© <span id="year"></span> Elm Roots, LLC. All rights reserved.</div>
      </footer>
    </div>

    <script>
      const y = new Date().getFullYear();
      const el = document.getElementById('year');
      if (el) el.textContent = String(y);
    </script>
  </body>
  </html>
